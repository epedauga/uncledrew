<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0b1020, #050816);
    color: white;
  }

  .header {
    padding: 20px;
    text-align: center;
    background: linear-gradient(90deg, #1d4ed8, #7c3aed);
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
  }

  .sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
  }

  /* 🟦 FEED HORIZONTAL PRO */
  #ticker-text {
    margin-top: 12px;
    overflow: hidden;
    position: relative;
    height: 120px;
  }

  .feed-track {
    display: flex;
    gap: 14px;
    width: max-content;
    animation: moveLeft 60s linear infinite;
  }

  @keyframes moveLeft {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* 🏀 CARD CUADRADA PRO */
  .game-card {
    min-width: 180px;
    height: 100px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 14px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .team {
    font-size: 12px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
  }

  .score {
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1px;
    margin: 4px 0;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 4px;
  }

  .bottom {
    font-size: 10px;
    display: flex;
    justify-content: space-between;
    opacity: 0.8;
  }

  .win { color: #16a34a; }
  .loss { color: #dc2626; }

  /* TABLE (LO DEJAMOS SIMPLE) */
  .container {
    padding: 12px;
    max-width: 1000px;
    margin: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    overflow: hidden;
  }

  thead {
    background: rgba(255,255,255,0.08);
  }

  th {
    padding: 6px;
    font-size: 12px;
    color: #93c5fd;
  }

  td {
    padding: 6px;
    font-size: 14px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .top10 { background: rgba(34,197,94,0.10); }
  .highlight-team { background: rgba(245,158,11,0.22) !important; }

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
  <div class="sub">Live data • Google Sheets</div>

  <div id="ticker-text">Cargando resultados...</div>
</div>

<div class="container">
  <div id="app"></div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

/* FEED AUTO SCORE */
async function load() {

  const textG = await (await fetch(GAMES_URL)).text();
  const rowsG = textG.trim().split("\n").map(r => r.split(","));
  const headersG = rowsG[0].map(h => h.trim());

  const games = rowsG.slice(1).map(r => {
    let obj = {};
    headersG.forEach((h, i) => obj[h] = r[i]?.trim());
    return obj;
  });

  const ticker = document.getElementById("ticker-text");

  const cards = games.map(g => {

    const a = g["TEAM_A"];
    const b = g["TEAM_B"];
    const sa = Number(g["SCORE_A"]);
    const sb = Number(g["SCORE_B"]);

    const aWin = sa > sb;
    const bWin = sb > sa;

    return `
      <div class="game-card">

        <div class="team">
          <span class="${aWin ? 'win' : 'loss'}">${a}</span>
          <span class="${bWin ? 'win' : 'loss'}">${b}</span>
        </div>

        <div class="score">${sa} - ${sb}</div>

        <div class="bottom">
          <span>${aWin ? "W" : "L"}</span>
          <span>${bWin ? "W" : "L"}</span>
        </div>

      </div>
    `;
  }).join("");

  ticker.innerHTML = `
    <div class="feed-track">
      ${cards}
      ${cards}
    </div>
  `;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
