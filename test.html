<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
.header {
  padding: 18px;
  text-align: center;
  background: #111;
  border-bottom: 1px solid #222;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.data-source {
  font-size: 11px;
  opacity: 0.4;
}

.live-indicator {
  margin-top: 6px;
  font-size: 12px;
  color: #C21E56;
}

.reset-btn {
  margin-top: 10px;
}

/* TABLE */
.container {
  padding: 12px;
  max-width: 1000px;
  margin: auto;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 520px;
  background: #0f0f0f;
}

th, td {
  padding: 6px;
  text-align: center;
}

thead {
  background: #111;
}

/* TOP 10 */
.top10 {
  background: rgba(255,255,255,0.07);
  border-left: 3px solid #C21E56;
}

/* ========================= */
/* USER SELECT (ROSA) */
/* ========================= */

.selected-team td {
  background: rgba(194, 30, 86, 0.12);
}

.selected-team td:first-child::before {
  content: "";
  position: absolute;
  left: 0;
  width: 3px;
  height: 100%;
  background: #C21E56;
}

/* MOBILE */
@media (max-width: 768px) {

  thead th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #111;
  }

  th:first-child, td:first-child {
    position: sticky;
    left: 0;
    background: #0f0f0f;
    z-index: 10;
  }

  th:nth-child(2), td:nth-child(2) {
    position: sticky;
    left: 45px;
    background: #0f0f0f;
    z-index: 11;
  }

  /* fix gap */
  td:nth-child(2)::before,
  th:nth-child(2)::before {
    content: "";
    position: absolute;
    left: -7px;
    width: 8px;
    height: 100%;
    background: #0f0f0f;
  }

  /* selected mobile */
  .selected-team td {
    background: transparent;
  }

  .selected-team td:nth-child(2) {
    background: #0f0f0f;
    position: sticky;
    left: 48px;
    z-index: 12;
    overflow: hidden;
  }

  .selected-team td:nth-child(2)::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(194,30,86,0.25);
    z-index: 0;
  }

  .selected-team td:nth-child(2) * {
    position: relative;
    z-index: 1;
  }

}

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
  <div class="data-source">Google Sheets</div>
</div>

<div class="container">
  <div class="table-wrap" id="app"></div>
</div>

<script>

const URL = "TU_URL";

/* =============================== */
/* AUTO HIGHLIGHT (UNCLE DREW) */
/* =============================== */
const AUTO_HIGHLIGHT = false;

let sortColumn = null;
let sortDir = "desc";

/* USER SELECT */
let selectedTeam = localStorage.getItem("team") || null;

function selectTeam(team) {
  if (selectedTeam === team) {
    selectedTeam = null;
    localStorage.removeItem("team");
  } else {
    selectedTeam = team;
    localStorage.setItem("team", team);
  }
  load();
}

async function load() {

  const text = await (await fetch(URL)).text();
  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0];

  let data = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const posKey = headers[0];
  const teamKey = headers.find(h => h.includes("TEAM"));

  data.sort((a,b)=>Number(a[posKey])-Number(b[posKey]));

  let html = "<table><thead><tr>";

  headers.forEach(h=>{
    html += `<th>${h}</th>`;
  });

  html += "</tr></thead><tbody>";

  data.forEach((row,i)=>{

    const team = row[teamKey];
    let cls = i < 10 ? "top10" : "";

    if (AUTO_HIGHLIGHT && team?.toLowerCase() === "uncle drew") {
      cls += " highlight-team";
    }

    if (selectedTeam && team === selectedTeam) {
      cls += " selected-team";
    }

    html += `<tr class="${cls}">`;

    headers.forEach(h=>{
      let value = row[h];

      if (h === teamKey) {
        html += `<td onclick="selectTeam('${value}')" style="cursor:pointer">${value}</td>`;
      } else {
        html += `<td>${value}</td>`;
      }

    });

    html += "</tr>";
  });

  html += "</tbody></table>";

  document.getElementById("app").innerHTML = html;
}

load();

</script>

</body>
</html>
