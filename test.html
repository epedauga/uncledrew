<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
.header {
  padding: 18px;
  text-align: center;
  background: #111;
  border-bottom: 1px solid #222;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  letter-spacing: 1px;
}

.data-source {
  margin-top: 4px;
  font-size: 11px;
  opacity: 0.4;
}

/* LIVE */
.live-indicator {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 600;
  color: #C21E56;
}

.live-indicator::before {
  content: "●";
  color: #C21E56;
  margin-right: 6px;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* RESET */
.reset-btn {
  margin-top: 10px;
  background: #151515;
  color: #aaa;
  border: 1px solid #222;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

/* TICKER */
#ticker-text {
  margin-top: 10px;
  overflow: hidden;
  padding: 10px 0;
  border-top: 1px solid #1c1c1c;
}

.feed-wrapper {
  display: flex;
  gap: 12px;
  width: max-content;
  animation: scrollX 80s linear infinite;
}

@keyframes scrollX {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.game-card {
  min-width: 220px;
  background: #151515;
  border-radius: 10px;
  padding: 10px;
  font-size: 12px;
  box-shadow: 0 0 0 1px rgba(194, 30, 86, 0.35);
}

/* TABLE */
.container {
  padding: 12px;
  max-width: 1000px;
  margin: auto;
}

.table-wrap {
  overflow-x: auto;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 520px;
  background: #0f0f0f;
  border: 1px solid #222;
  table-layout: auto;
}

thead {
  background: #111;
}

th {
  padding: 6px 8px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #aaa;
  cursor: pointer;
  background: rgba(255,255,255,0.04);
}

td {
  padding: 6px 8px;
  font-size: 14px;
  text-align: center;
  border-top: 1px solid #1c1c1c;
}

tbody tr:hover {
  background: rgba(255,255,255,0.03);
}

/* TOP 10 */
.top10 {
  background: rgba(255,255,255,0.07);
  border-left: 3px solid #C21E56;
}

/* UNCLE DREW */
.highlight-team {
  position: relative;
}

.highlight-team td {
  background: rgba(255, 140, 66, 0.08);
}

/* 🟠 BAR LATERAL (FUNCIONAL) */
.highlight-team td:first-child {
  position: relative;
}

.highlight-team td:first-child::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: #ff8c42;
}

/* TEAM COLUMN */
table th:nth-child(2),
table td:nth-child(2) {
  min-width: 120px;
  white-space: nowrap;
  padding: 0 10px;
}

/* LAST 5 */
table th:last-child,
table td:last-child {
  white-space: nowrap;
  width: 55px;
  max-width: 55px;
  padding: 6px 4px;
}

/* SORT */
th.sorted-asc {
  color: #fff;
  border-bottom: 2px solid #ef4444;
}

th.sorted-desc {
  color: #fff;
  border-top: 2px solid #ef4444;
}

th.sorted-active {
  color: #fff;
}

/* ===================== */
/* MOBILE FIX (SOLO STICKY) */
/* ===================== */

@media (max-width: 768px) {

  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    border-collapse: separate;
    border-spacing: 0;
  }

  table th,
  table td {
    background: #0f0f0f;
  }

  table th {
    background: #111;
  }

  /* POS FIXA */
  table th:first-child,
  table td:first-child {
    position: sticky;
    left: 0;
    z-index: 20;
  }

  /* TEAM FIXA */
  table th:nth-child(2),
  table td:nth-child(2) {
    position: sticky;
    left: 45px;
    z-index: 20;

    background: #0f0f0f;
    min-width: 120px;
    white-space: nowrap;
  }

  /* sombra anti “texto detrás” */
  table td:first-child,
  table td:nth-child(2) {
    box-shadow: 10px 0 12px rgba(0,0,0,0.6);
  }
}

</style>
</head>

<body>

<div class="header">
