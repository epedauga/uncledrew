<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
.header {
  padding: 18px;
  text-align: center;
  background: #111;
  border-bottom: 1px solid #222;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  letter-spacing: 1px;
}

.data-source {
  margin-top: 4px;
  font-size: 11px;
  opacity: 0.4;
}

/* LIVE */
.live-indicator {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 600;
  color: #C21E56;
}

.live-indicator::before {
  content: "●";
  color: #C21E56;
  margin-right: 6px;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* RESET */
.reset-btn {
  margin-top: 10px;
  background: #151515;
  color: #aaa;
  border: 1px solid #222;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

/* TICKER */
#ticker-text {
  margin-top: 10px;
  overflow: hidden;
  padding: 10px 0;
  border-top: 1px solid #1c1c1c;
}

.feed-wrapper {
  display: flex;
  gap: 12px;
  width: max-content;
  animation: scrollX 80s linear infinite;
}

@keyframes scrollX {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.game-card {
  min-width: 220px;
  background: #151515;
  border-radius: 10px;
  padding: 10px;
  font-size: 12px;
  box-shadow: 0 0 0 1px rgba(194, 30, 86, 0.35);
}

/* TABLE */
.container {
  padding: 12px;
  max-width: 1000px;
  margin: auto;
}

.table-wrap {
  overflow-x: auto;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  min-width: 520px;
  background: #0f0f0f;
  border: 1px solid #222;
}

thead th {
  background: #111;
  position: sticky;
  top: 0;
  z-index: 5;
}

th {
  padding: 6px 8px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #aaa;
  cursor: pointer;
  background: rgba(255,255,255,0.04);
}

td {
  padding: 6px 8px;
  font-size: 14px;
  text-align: center;
  border-top: 1px solid #1c1c1c;
}

tbody tr:hover {
  background: rgba(255,255,255,0.03);
}

/* TOP 10 */
.top10 {
  background: rgba(255,255,255,0.07);
  border-left: 3px solid #C21E56;
}

/* UNCLE DREW */
.highlight-team td {
  background: rgba(255, 140, 66, 0.08);
}

.highlight-team td:first-child {
  position: relative;
}

.highlight-team td:first-child::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: #ff8c42;
}

/* TEAM COLUMN */
table th:nth-child(2),
table td:nth-child(2) {
  min-width: 120px;
  white-space: nowrap;
  padding: 0 10px;
}

/* LAST 5 */
table th:last-child,
table td:last-child {
  white-space: nowrap;
  width: 55px;
  max-width: 55px;
  padding: 6px 4px;
}

/* SORT */
th.sorted-asc {
  color: #fff;
  border-bottom: 2px solid #ef4444;
}

th.sorted-desc {
  color: #fff;
  border-top: 2px solid #ef4444;
}

th.sorted-active {
  color: #fff;
}

/* =========================
   MOBILE FIX REAL (ESTABLE)
========================= */

@media (max-width: 768px) {

  table {
    border-collapse: separate;
    border-spacing: 0;
  }

  th, td {
    background: #0f0f0f;
  }

  /* POSICIÓN */
  table th:nth-child(1),
  table td:nth-child(1) {
    position: sticky;
    left: 0;
    z-index: 50;
    width: 45px;
    min-width: 45px;
    max-width: 45px;
  }

  /* TEAM */
  table th:nth-child(2),
  table td:nth-child(2) {
    position: sticky;
    left: 45px;
    z-index: 60;
    min-width: 140px;
    white-space: nowrap;
    background: #0f0f0f !important;
    box-shadow: 8px 0 10px rgba(0,0,0,0.6);
  }

  /* evita que el scroll “se vea por debajo” */
  tbody td {
    position: relative;
  }

  /* TOP 10 BAR ROSA SIEMPRE VISIBLE */
  .top10 td:first-child {
    position: relative;
  }

  .top10 td:first-child::before,
  .top10 td:first-child::after {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: #C21E56;
    z-index: 100;
  }

  /* UNCLE DREW SIN SOMBRA EXTRA */
  .highlight-team td {
    box-shadow: none !important;
  }

}

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
  <div class="data-source">Data source: Google Sheets</div>
  <div class="live-indicator">LIVE</div>
  <button class="reset-btn" onclick="resetSort()">Reset order</button>
  <div id="ticker-text">Cargando resultados...</div>
</div>

<div class="container">
  <div class="table-wrap" id="app"></div>
</div>

<script>

/* ===== TU JS SIN TOCAR ===== */

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

let sortColumn = null;
let sortDir = "desc";

function resetSort(){
  sortColumn = null;
  sortDir = "desc";
  load();
}

function sortTable(col){
  if(sortColumn === col){
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortColumn = col;
    sortDir = "desc";
  }
  load();
}

function calculateStreak(team,games){
  let t=null,c=0;
  for(let g of games){
    const A=g.TEAM_A,B=g.TEAM_B;
    const SA=+g.SCORE_A||0,SB=+g.SCORE_B||0;
    if(!A||!B) continue;
    let r=null;
    if(team===A) r=SA>SB?"W":"L";
    else if(team===B) r=SB>SA?"W":"L";
    else continue;
    if(!t){t=r;c=1;}
    else if(r===t)c++;
    else break;
  }
  return t?`${t}${c}`:"";
}

function calculateLast5(team,games){
  let r=[];
  for(let g of games){
    const A=g.TEAM_A,B=g.TEAM_B;
    const SA=+g.SCORE_A||0,SB=+g.SCORE_B||0;
    if(!A||!B) continue;
    let res=null;
    if(team===A) res=SA>SB?"W":"L";
    else if(team===B) res=SB>SA?"W":"L";
    else continue;
    r.push(res);
    if(r.length===5) break;
  }
  return `${r.filter(x=>x==="W").length}-${r.filter(x=>x==="L").length}`;
}

async function load(){

  const text = await (await fetch(URL)).text();
  const rows = text.trim().split("\n").map(r=>r.split(","));
  const headers = rows[0];

  let data = rows.slice(1).map(r=>{
    let o={};
    headers.forEach((h,i)=>o[h]=r[i]);
    return o;
  });

  const games = (await (await fetch(GAMES_URL)).text())
    .trim().split("\n").slice(1)
    .map(r=>{
      const s=r.split(",");
      return {TEAM_A:s[0],TEAM_B:s[1],SCORE_A:s[2],SCORE_B:s[3]};
    });

  const teamKey=headers.find(h=>h.includes("TEAM"));

  data.forEach(r=>{
    r.STREAK=calculateStreak(r[teamKey],games);
    r["LAST 5"]=calculateLast5(r[teamKey],games);
  });

  const app=document.getElementById("app");

  let html="<table><thead><tr>";

  headers.concat(["STREAK","LAST 5"]).forEach(h=>{
    html+=`<th onclick="sortTable('${h}')">${h}</th>`;
  });

  html+="</tr></thead><tbody>";

  data.forEach((r,i)=>{
    const team=r[teamKey];
    let cls=i<10?"top10":"";
    if(team?.toLowerCase()==="uncle drew") cls+=" highlight-team";

    html+=`<tr class="${cls}">`;

    headers.concat(["STREAK","LAST 5"]).forEach(h=>{
      let v=r[h]||"";
      if(h==="STREAK"){
        const c=v.startsWith("W")?"#22c55e":"#ef4444";
        v=`<span style="color:${c};font-weight:600">${v}</span>`;
      }
      html+=`<td>${v}</td>`;
    });

    html+="</tr>";
  });

  html+="</tbody></table>";

  app.innerHTML=html;
}

load();
setInterval(load,30000);

</script>

</body>
</html>
