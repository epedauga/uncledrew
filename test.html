<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

let sortColumn = null;
let sortDir = "desc";

function getStatusEmoji(i) {
  if (i === 0) return "🏆";
  if (i < 7) return "🟢";
  if (i < 15) return "⚠️";
  return "☠️";
}

/* 🔥 STREAK */
function calculateStreak(team, games) {
  let streakType = null;
  let count = 0;

  for (let g of games) {
    const teamA = g["TEAM A"] || g["Team A"];
    const teamB = g["TEAM B"] || g["Team B"];
    const scoreA = Number(g["SCORE A"] || g["Score A"]);
    const scoreB = Number(g["SCORE B"] || g["Score B"]);

    let result = null;

    if (team === teamA) {
      result = scoreA > scoreB ? "W" : "L";
    } else if (team === teamB) {
      result = scoreB > scoreA ? "W" : "L";
    } else {
      continue;
    }

    if (!streakType) {
      streakType = result;
      count = 1;
    } else if (result === streakType) {
      count++;
    } else {
      break;
    }
  }

  return streakType ? `${streakType}${count}` : "";
}

async function load() {

  /* 🏀 STANDINGS */
  const res = await fetch(URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0].map(h => h.trim());

  let data = rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = row[i]?.trim());
    return obj;
  });

  /* 🔥 GAMES */
  const resG = await fetch(GAMES_URL);
  const textG = await resG.text();

  const rowsG = textG.trim().split("\n").map(r => r.split(","));
  const headersG = rowsG[0];

  const games = rowsG.slice(1).map(r => {
    let obj = {};
    headersG.forEach((h, i) => obj[h.trim()] = r[i]?.trim());
    return obj;
  });

  /* 🔥 RESULTS (ticker) */
  const resR = await fetch(RESULTS_URL);
  const textR = await resR.text();

  const results = textR
    .trim()
    .split("\n")
    .slice(1)
    .map(r => r.trim())
    .filter(r => r.length > 3);

  document.getElementById("ticker-text").innerText =
    results.join("   •   ");

  const posKey = headers[0];
  const teamKey = headers.find(h => h.toLowerCase().includes("team"));

  /* 🔥 INYECTAR STREAK */
  data.forEach(row => {
    const team = row[teamKey];
    row["STREAK"] = calculateStreak(team, games);
  });

  /* 📊 ORDEN */
  if (sortColumn) {
    data.sort((a, b) => {
      let A = a[sortColumn];
      let B = b[sortColumn];

      const nA = Number(A);
      const nB = Number(B);

      if (!isNaN(nA) && !isNaN(nB)) {
        return sortDir === "asc" ? nA - nB : nB - nA;
      }

      return sortDir === "asc"
        ? A.localeCompare(B)
        : B.localeCompare(A);
    });
  } else {
    data.sort((a, b) => Number(a[posKey]) - Number(b[posKey]));
  }

  render([...headers, "STREAK"], data, teamKey);
}

function sortBy(column) {
  if (sortColumn === column) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortColumn = column;
    sortDir = "desc";
  }
  load();
}

function render(headers, data, teamKey) {
  const app = document.getElementById("app");

  let html = "<table>";

  html += "<thead><tr>";
  headers.forEach(h => {
    let arrow = "";
    if (h === sortColumn) {
      arrow = sortDir === "asc" ? " ▲" : " ▼";
    }
    html += `<th onclick="sortBy('${h}')">${h}${arrow}</th>`;
  });
  html += "</tr></thead>";

  html += "<tbody>";

  data.forEach((row, i) => {

    let cls = "";
    if (i < 10) cls += " top10";

    const teamName = row[teamKey];

    if (teamName && teamName.toLowerCase() === "uncle drew") {
      cls += " highlight-team";
    }

    html += `<tr class="${cls}">`;

    headers.forEach(h => {
      let value = row[h] || "";

      if (h === "STREAK" && value) {
        value = value.startsWith("W")
          ? `🔥 ${value}`
          : `❄️ ${value}`;
      }

      if (h === teamKey && teamName.toLowerCase() === "uncle drew") {
        value = `${getStatusEmoji(i)} ${value}`;
      }

      html += `<td>${value}</td>`;
    });

    html += "</tr>";
  });

  html += "</tbody></table>";

  app.innerHTML = html;
}

load();
setInterval(load, 30000);

</script>
