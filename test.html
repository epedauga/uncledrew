<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
.header {
  padding: 18px;
  text-align: center;
  background: #111;
  border-bottom: 1px solid #222;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.data-source {
  font-size: 11px;
  opacity: 0.4;
}

/* LIVE */
.live-indicator {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 600;
  color: #C21E56;
}

.live-indicator::before {
  content: "●";
  margin-right: 6px;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  50% { opacity: 0.3; }
}

/* RESET */
.reset-btn {
  margin-top: 10px;
  background: #151515;
  color: #aaa;
  border: 1px solid #222;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

/* TICKER */
#ticker-text {
  margin-top: 10px;
  overflow: hidden;
  padding: 10px 0;
  border-top: 1px solid #1c1c1c;
}

.feed-wrapper {
  display: flex;
  gap: 12px;
  width: max-content;
  animation: scrollX 80s linear infinite;
}

@keyframes scrollX {
  100% { transform: translateX(-50%); }
}

.game-card {
  min-width: 220px;
  background: #151515;
  border-radius: 10px;
  padding: 10px;
  font-size: 12px;
  box-shadow: 0 0 0 1px rgba(194, 30, 86, 0.35);
}

/* CONTAINER */
.container {
  padding: 12px;
  max-width: 1000px;
  margin: auto;
}

/* GRID */
.grid-wrap {
  overflow-x: auto;
}

.grid-row {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(70px, auto);
  min-width: max-content;
}

.cell {
  padding: 8px;
  border-bottom: 1px solid #1c1c1c;
  background: #0f0f0f;
  text-align: center;
}

/* HEADER */
.grid-header .cell {
  position: sticky;
  top: 0;
  z-index: 5;
  background: #111;
  font-size: 12px;
  text-transform: uppercase;
  color: #aaa;
  cursor: pointer;
}

/* COLUMNAS FIJAS */
.pos {
  position: sticky;
  left: 0;
  z-index: 6;
  background: #0f0f0f;
}

.team {
  position: sticky;
  left: 60px;
  z-index: 7;
  background: #0f0f0f;
  text-align: left;
  padding-left: 10px;
}

/* TOP 10 */
.top10 .pos::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: #C21E56;
}

/* UNCLE DREW */
.highlight-team .team {
  background: rgba(255, 140, 66, 0.2);
  font-weight: 600;
}

.highlight-team .pos::before {
  background: #ff8c42;
}

/* SORT */
.header-cell.sorted-asc {
  border-bottom: 2px solid #ef4444;
  color: #fff;
}

.header-cell.sorted-desc {
  border-top: 2px solid #ef4444;
  color: #fff;
}

.header-cell.sorted-active {
  color: #fff;
}

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
  <div class="data-source">Data source: Google Sheets</div>
  <div class="live-indicator">LIVE</div>
  <button class="reset-btn" onclick="resetSort()">Reset order</button>
  <div id="ticker-text">Cargando resultados...</div>
</div>

<div class="container">
  <div id="app"></div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";
const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";
const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

let sortColumn = null;
let sortDir = "desc";

/* RESET */
function resetSort() {
  sortColumn = null;
  sortDir = "desc";
  load();
}

/* SORT */
function sortTable(col) {
  if (sortColumn === col) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortColumn = col;
    sortDir = "desc";
  }
  load();
  setTimeout(updateSortUI, 50);
}

/* SORT UI */
function updateSortUI() {
  document.querySelectorAll(".header-cell").forEach(th => {
    th.classList.remove("sorted-asc", "sorted-desc", "sorted-active");
    if (th.textContent.trim() === sortColumn) {
      th.classList.add("sorted-active");
      th.classList.add(sortDir === "asc" ? "sorted-asc" : "sorted-desc");
    }
  });
}

/* STREAK */
function calculateStreak(team, games) {
  let type = null, count = 0;
  for (let g of games) {
    const a = g["TEAM_A"], b = g["TEAM_B"];
    const sa = Number(g["SCORE_A"]) || 0;
    const sb = Number(g["SCORE_B"]) || 0;
    if (!a || !b) continue;

    let r = null;
    if (team === a) r = sa > sb ? "W" : "L";
    else if (team === b) r = sb > sa ? "W" : "L";
    else continue;

    if (!type) { type = r; count = 1; }
    else if (r === type) count++;
    else break;
  }
  return type ? `${type}${count}` : "";
}

/* LAST 5 */
function calculateLast5(team, games) {
  let res = [];
  for (let g of games) {
    const a = g["TEAM_A"], b = g["TEAM_B"];
    const sa = Number(g["SCORE_A"]) || 0;
    const sb = Number(g["SCORE_B"]) || 0;
    if (!a || !b) continue;

    let r = null;
    if (team === a) r = sa > sb ? "W" : "L";
    else if (team === b) r = sb > sa ? "W" : "L";
    else continue;

    res.push(r);
    if (res.length === 5) break;
  }
  return `${res.filter(x=>x==="W").length}-${res.filter(x=>x==="L").length}`;
}

/* LOAD */
async function load() {

  const text = await (await fetch(URL)).text();
  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0].map(h => h.trim());

  let data = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h,i)=>obj[h]=r[i]?.trim());
    return obj;
  });

  const textG = await (await fetch(GAMES_URL)).text();
  const rowsG = textG.trim().split("\n").map(r => r.split(","));
  const headersG = rowsG[0].map(h => h.trim());

  const games = rowsG.slice(1).map(r => {
    let obj = {};
    headersG.forEach((h,i)=>obj[h]=r[i]?.trim());
    return obj;
  });

  const textR = await (await fetch(RESULTS_URL)).text();
  const results = textR.trim().split("\n").slice(1);

  /* ticker */
  const ticker = document.getElementById("ticker-text");
  const cards = results.map(r=>{
    const p=r.split(",");
    return `<div class="game-card">
      <div>${p[0]||""}</div>
      <div><b>${p[1]||""}</b> ${p[2]||""}</div>
      <div>${p[3]||""}</div>
    </div>`;
  }).join("");
  ticker.innerHTML = `<div class="feed-wrapper">${cards}${cards}</div>`;

  const posKey = headers[0];
  const teamKey = headers.find(h=>h.includes("TEAM"));

  data.forEach(row=>{
    const t=row[teamKey];
    row["STREAK"]=calculateStreak(t,games);
    row["LAST 5"]=calculateLast5(t,games);
  });

  if (sortColumn) {
    data.sort((a,b)=>{
      let A=isNaN(a[sortColumn])?a[sortColumn]:Number(a[sortColumn]);
      let B=isNaN(b[sortColumn])?b[sortColumn]:Number(b[sortColumn]);
      return sortDir==="asc"?A-B:B-A;
    });
  } else {
    data.sort((a,b)=>Number(a[posKey])-Number(b[posKey]));
  }

  const app = document.getElementById("app");
  let cols = headers.concat(["STREAK","LAST 5"]);

  let html = `<div class="grid-wrap">`;

  html += `<div class="grid-row grid-header">`;
  cols.forEach(h=>{
    html += `<div class="cell header-cell" onclick="sortTable('${h}')">${h}</div>`;
  });
  html += `</div>`;

  data.forEach((row,i)=>{
    const team=row[teamKey];
    let cls="grid-row";
    if(i<10) cls+=" top10";
    if(team?.toLowerCase()==="uncle drew") cls+=" highlight-team";

    html += `<div class="${cls}">`;

    cols.forEach((h,index)=>{
      let val=row[h]||"";
      if(h==="STREAK"){
        const c=val.startsWith("W")?"#22c55e":"#ef4444";
        val=`<span style="color:${c};font-weight:600">${val}</span>`;
      }

      let extra="";
      if(index===0) extra="pos";
      if(index===1) extra="team";

      html += `<div class="cell ${extra}">${val}</div>`;
    });

    html += `</div>`;
  });

  html += `</div>`;
  app.innerHTML = html;

  updateSortUI();
}

load();

let timer = setInterval(load, 30000);

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    clearInterval(timer);
    timer = null;
  } else {
    if (!timer) {
      load();
      timer = setInterval(load, 30000);
    }
  }
});

</script>

</body>
</html>
