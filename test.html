<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0b1020, #050816);
    color: white;
  }

  .header {
    padding: 20px;
    text-align: center;
    background: linear-gradient(90deg, #1d4ed8, #7c3aed);
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
  }

  .sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
  }

  .container {
    padding: 12px;
    max-width: 1000px;
    margin: auto;
  }

  /* 🏀 SCROLL WRAP */
  .scroll {
    overflow-x: auto;
    border-radius: 12px;
  }

  /* 🏀 ROW BASE (mantiene look de tabla) */
  .row {
    display: grid;
    grid-template-columns: 140px repeat(auto-fit, minmax(60px, 1fr));
    align-items: center;
    font-size: 13px;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 6px 0;
    min-width: 600px;
  }

  .header-row {
    background: rgba(255,255,255,0.08);
    font-size: 12px;
    text-transform: uppercase;
    color: #93c5fd;
    font-weight: bold;
  }

  /* 📌 TEAM FIX REAL (NO SE MUEVE MÁS) */
  .team {
    position: sticky;
    left: 0;
    z-index: 5;

    background: rgba(11, 16, 32, 0.98);
    padding-left: 8px;

    font-weight: bold;
    color: #60a5fa;

    width: 140px;
    min-width: 140px;
  }

  .cell {
    text-align: center;
  }

  .row:hover {
    background: rgba(59,130,246,0.08);
  }

  .top10 {
    background: rgba(34,197,94,0.10);
  }

  .highlight-team {
    background: rgba(245, 158, 11, 0.22);
    box-shadow: 0 0 10px rgba(245, 158, 11, 0.25);
  }

  /* 📱 MOBILE */
  @media (max-width: 600px) {
    .row {
      font-size: 11px;
      grid-template-columns: 120px repeat(auto-fit, minmax(50px, 1fr));
    }

    .team {
      width: 120px;
      min-width: 120px;
    }
  }

</style>
</head>

<body>

<div class="header">
  <h1>🏀 STANDINGS</h1>
  <div class="sub">Live data • Google Sheets</div>
</div>

<div class="container">
  <div class="scroll" id="app">
    <div style="text-align:center; opacity:0.7;">Cargando...</div>
  </div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

function getStatusEmoji(i) {
  if (i === 0) return "🏆";
  if (i < 10) return "🟢";
  if (i < 15) return "🔴";
  return "☠️";
}

async function load() {
  const res = await fetch(URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));

  const headers = rows[0].map(h => h.trim());
  const dataRows = rows.slice(1);

  let data = dataRows.map(row => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = row[i] ? row[i].trim() : "";
    });
    return obj;
  });

  render(headers, data);
}

function render(headers, data) {
  const app = document.getElementById("app");

  const teamKey = headers.find(h =>
    h.toLowerCase().includes("team")
  );

  let html = "";

  /* HEADER */
  html += `<div class="row header-row">`;
  headers.forEach(h => {
    html += `<div>${h}</div>`;
  });
  html += `</div>`;

  /* ROWS */
  data.forEach((row, i) => {

    let cls = "row";

    const teamName = row[teamKey];

    const isUncleDrew =
      teamName &&
      teamName.toLowerCase() === "uncle drew";

    if (i < 10) cls += " top10";
    if (isUncleDrew) cls += " highlight-team";

    html += `<div class="${cls}">`;

    headers.forEach(h => {

      let value = row[h];

      if (teamKey && h === teamKey && isUncleDrew) {
        value = `${getStatusEmoji(i)} ${value}`;
      }

      if (h === teamKey) {
        html += `<div class="team">${value}</div>`;
      } else {
        html += `<div class="cell">${value}</div>`;
      }
    });

    html += `</div>`;
  });

  app.innerHTML = html;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
