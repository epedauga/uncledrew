<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const RESULTS_URL = "PEGÁ_LINK_RESULTS";
const GAMES_URL = "PEGÁ_LINK_GAMESSORTED";

let sortColumn = null;
let sortDir = "desc";

function getStatusEmoji(i) {
  if (i === 0) return "🏆";
  if (i < 7) return "🟢";
  if (i < 15) return "⚠️";
  return "☠️";
}

/* 🔥 CALCULAR STREAK */
function calculateStreak(team, games) {
  let streakType = null;
  let count = 0;

  for (let g of games) {
    const teamA = g["TEAM A"];
    const teamB = g["TEAM B"];
    const scoreA = Number(g["SCORE A"]);
    const scoreB = Number(g["SCORE B"]);

    let result = null;

    if (team === teamA) {
      result = scoreA > scoreB ? "W" : "L";
    } else if (team === teamB) {
      result = scoreB > scoreA ? "W" : "L";
    } else {
      continue;
    }

    if (!streakType) {
      streakType = result;
      count = 1;
    } else if (result === streakType) {
      count++;
    } else {
      break;
    }
  }

  return streakType ? `${streakType}${count}` : "";
}

async function load() {

  /* 🏀 STANDINGS */
  const res = await fetch(URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0].map(h => h.trim());
  let dataRows = rows.slice(1);

  let data = dataRows.map(row => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = row[i] ? row[i].trim() : "";
    });
    return obj;
  });

  /* 🔥 GAMES (para streak) */
  const resGames = await fetch(GAMES_URL);
  const textGames = await resGames.text();

  const rowsGames = textGames.trim().split("\n").map(r => r.split(","));
  const headersGames = rowsGames[0];

  const games = rowsGames.slice(1).map(r => {
    let obj = {};
    headersGames.forEach((h, i) => obj[h.trim()] = r[i]?.trim());
    return obj;
  });

  /* 🔥 RESULTADOS (ticker) */
  const res2 = await fetch(RESULTS_URL);
  const text2 = await res2.text();

  const results = text2
    .trim()
    .split("\n")
    .slice(1)
    .map(r => r.trim())
    .filter(r => r.length > 3);

  document.getElementById("ticker-text").innerText =
    results.join("   •   ");

  const posKey = headers[0];
  const teamKey = headers.find(h => h.toLowerCase().includes("team"));

  /* 🔥 INYECTAR STREAK */
  data.forEach(row => {
    const team = row[teamKey];
    row["STREAK"] = calculateStreak(team, games);
  });

  /* 📊 ORDENAMIENTO */
  if (sortColumn) {
    data.sort((a, b) => {
      let valA = a[sortColumn];
      let valB = b[sortColumn];

      const numA = Number(valA);
      const numB = Number(valB);

      if (!isNaN(numA) && !isNaN(numB)) {
        return sortDir === "asc" ? numA - numB : numB - numA;
      }

      return sortDir === "asc"
        ? valA.localeCompare(valB)
        : valB.localeCompare(valA);
    });
  } else {
    data.sort((a, b) => Number(a[posKey]) - Number(b[posKey]));
  }

  render([...headers, "STREAK"], data, teamKey);
}

function sortBy(column) {
  if (sortColumn === column) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortColumn = column;
    sortDir = "desc";
  }
  load();
}

function render(headers, data, teamKey) {
  const app = document.getElementById("app");

  let html = "<table>";

  html += "<thead><tr>";
  headers.forEach(h => {
    let arrow = "";
    if (h === sortColumn) {
      arrow = sortDir === "asc" ? " ▲" : " ▼";
    }
    html += `<th onclick="sortBy('${h}')">${h}${arrow}</th>`;
  });
  html += "</tr></thead>";

  html += "<tbody>";

  data.forEach((row, i) => {

    let cls = "";
    if (i < 10) cls += " top10";

    const teamName = teamKey ? row[teamKey] : "";

    const isUncleDrew =
      teamName &&
      teamName.toLowerCase() === "uncle drew";

    if (isUncleDrew) cls += " highlight-team";

    html += `<tr class="${cls}">`;

    headers.forEach(h => {
      let value = row[h];

      /* 🔥 STREAK VISUAL */
      if (h === "STREAK" && value) {
        if (value.startsWith("W")) {
          value = `🔥 ${value}`;
        } else if (value.startsWith("L")) {
          value = `❄️ ${value}`;
        }
      }

      if (teamKey && h === teamKey && isUncleDrew) {
        value = `${getStatusEmoji(i)} ${value}`;
      }

      html += `<td>${value || ""}</td>`;
    });

    html += "</tr>";
  });

  html += "</tbody></table>";

  app.innerHTML = html;
}

load();
setInterval(load, 30000);

</script>
