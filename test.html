<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 ESPN Score Bug</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0b1020, #050816);
    color: white;
    overflow: hidden;
  }

  /* 📺 SCORE BUG CONTAINER */
  .scorebug {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 15, 30, 0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 18px;
    min-width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .team {
    font-weight: 600;
    font-size: 14px;
    width: 90px;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }

  .score {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    min-width: 70px;
    text-align: center;
  }

  .win {
    color: #22c55e;
  }

  .loss {
    color: #ef4444;
    opacity: 0.6;
  }

  .meta {
    font-size: 10px;
    opacity: 0.6;
    position: absolute;
    top: -18px;
    left: 0;
  }

  /* animación suave cambio */
  .fade {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

</style>
</head>

<body>

<div id="scorebug"></div>

<script>

const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

let index = 0;
let games = [];

async function load() {
  const text = await (await fetch(RESULTS_URL)).text();
  games = text.trim().split("\n").slice(1).filter(r => r.length > 3);
  render();
}

function render() {

  if (games.length === 0) return;

  const r = games[index % games.length];
  const p = r.split(",");

  const date = p[0] || "";
  const teamA = p[1] || "";
  const teamB = p[2] || "";
  let score = p[3] || "0-0";

  let [a, b] = score.includes("-") ? score.split("-") : [0,0];

  let aClass = "", bClass = "";

  if (Number(a) > Number(b)) {
    aClass = "win";
    bClass = "loss";
  } else if (Number(b) > Number(a)) {
    bClass = "win";
    aClass = "loss";
  }

  document.getElementById("scorebug").innerHTML = `
    <div class="scorebug fade">

      <div class="meta">${date}</div>

      <div class="team ${aClass}">${teamA}</div>

      <div class="score">${a}-${b}</div>

      <div class="team ${bClass}">${teamB}</div>

    </div>
  `;

  index++;
}

load();
setInterval(render, 4000);   // cambia cada 4s

</script>

</body>
</html>
