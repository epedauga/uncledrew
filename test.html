<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
.header {
  padding: 18px;
  text-align: center;
  background: #111;
  border-bottom: 1px solid #222;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  letter-spacing: 1px;
}

.data-source {
  margin-top: 4px;
  font-size: 11px;
  opacity: 0.4;
}

/* LIVE */
.live-indicator {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 600;
  color: #C21E56;
}

.live-indicator::before {
  content: "●";
  color: #C21E56;
  margin-right: 6px;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* RESET */
.reset-btn {
  margin-top: 10px;
  background: #151515;
  color: #aaa;
  border: 1px solid #222;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

/* TICKER */
#ticker-text {
  margin-top: 10px;
  overflow: hidden;
  padding: 10px 0;
  border-top: 1px solid #1c1c1c;
}

.feed-wrapper {
  display: flex;
  gap: 12px;
  width: max-content;
  animation: scrollX 80s linear infinite;
}

@keyframes scrollX {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.game-card {
  min-width: 220px;
  background: #151515;
  border-radius: 10px;
  padding: 10px;
  font-size: 12px;
  box-shadow: 0 0 0 1px rgba(194, 30, 86, 0.35);
}

/* TABLE */
.container {
  padding: 12px;
  max-width: 1000px;
  margin: auto;
}

.table-wrap {
  overflow-x: auto;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 520px;
  background: #0f0f0f;
  border: 1px solid #222;
  table-layout: auto;
}

thead {
  background: #111;
}

th {
  padding: 6px 8px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #aaa;
  cursor: pointer;
  background: rgba(255,255,255,0.04);
}

td {
  padding: 6px 8px;
  font-size: 14px;
  text-align: center;
  border-top: 1px solid #1c1c1c;
}

tbody tr:hover {
  background: rgba(255,255,255,0.03);
}

/* TOP 10 */
.top10 {
  background: rgba(255,255,255,0.07);
  border-left: 3px solid #C21E56;
}

/* UNCLE DREW */
.highlight-team td {
  background: rgba(255, 140, 66, 0.14) !important;
}

/* TEAM COLUMN */
table th:nth-child(2),
table td:nth-child(2) {
  min-width: 120px;
  white-space: nowrap;
  padding: 0 10px;
}

/* SORT VISUAL */
th.sorted-asc {
  border-bottom: 2px solid #ef4444;
  color: #fff;
}

th.sorted-desc {
  border-top: 2px solid #ef4444;
  color: #fff;
}

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
  <div class="data-source">Data source: Google Sheets</div>
  <div class="live-indicator">LIVE</div>
  <button class="reset-btn" onclick="resetSort()">Reset order</button>
  <div id="ticker-text">Cargando resultados...</div>
</div>

<div class="container">
  <div class="table-wrap" id="app"></div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

let sortColumn = null;
let sortDir = "desc";

/* RESET */
function resetSort() {
  sortColumn = null;
  sortDir = "desc";
  load();
}

/* SORT */
function sortTable(col) {
  if (sortColumn === col) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortColumn = col;
    sortDir = "desc";
  }
  load();
}

/* STREAK */
function calculateStreak(team, games) {
  let type = null;
  let count = 0;

  for (let g of games) {
    const teamA = g["TEAM_A"];
    const teamB = g["TEAM_B"];

    const scoreA = Number(g["SCORE_A"]) || 0;
    const scoreB = Number(g["SCORE_B"]) || 0;

    if (!teamA || !teamB) continue;

    let result = null;

    if (team === teamA) result = scoreA > scoreB ? "W" : "L";
    else if (team === teamB) result = scoreB > scoreA ? "W" : "L";
    else continue;

    if (!type) {
      type = result;
      count = 1;
    } else if (result === type) {
      count++;
    } else break;
  }

  return type ? `${type}${count}` : "";
}

/* ⭐ LAST 5 */
function calculateLast5(team, games) {
  let res = [];

  for (let g of games) {
    const teamA = g["TEAM_A"];
    const teamB = g["TEAM_B"];

    const scoreA = Number(g["SCORE_A"]) || 0;
    const scoreB = Number(g["SCORE_B"]) || 0;

    if (!teamA || !teamB) continue;

    let result = null;

    if (team === teamA) result = scoreA > scoreB ? "W" : "L";
    else if (team === teamB) result = scoreB > scoreA ? "W" : "L";
    else continue;

    res.push(result);
    if (res.length === 5) break;
  }

  return res.join("");
}

/* LOAD */
async function load() {

  const text = await (await fetch(URL)).text();
  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0].map(h => h.trim());

  let data = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]?.trim());
    return obj;
  });

  const textG = await (await fetch(GAMES_URL)).text();
  const rowsG = textG.trim().split("\n").map(r => r.split(","));
  const headersG = rowsG[0].map(h => h.trim());

  const games = rowsG.slice(1).map(r => {
    let obj = {};
    headersG.forEach((h, i) => obj[h] = r[i]?.trim());
    return obj;
  });

  const textR = await (await fetch(RESULTS_URL)).text();
  const results = textR.trim().split("\n").slice(1);

  /* TICKER */
  const ticker = document.getElementById("ticker-text");

  const cards = results.map(r => {
    const p = r.split(",");
    return `
      <div class="game-card">
        <div>${p[0] || ""}</div>
        <div><b>${p[1] || ""}</b> ${p[2] || ""}</div>
        <div>${p[3] || ""}</div>
      </div>
    `;
  }).join("");

  ticker.innerHTML = `<div class="feed-wrapper">${cards}${cards}</div>`;

  /* STATS */
  const posKey = headers[0];
  const teamKey = headers.find(h => h.includes("TEAM"));

  data.forEach(row => {
    row["STREAK"] = calculateStreak(row[teamKey], games);
    row["LAST5"] = calculateLast5(row[teamKey], games);
  });

  /* SORT */
  if (sortColumn) {
    data.sort((a, b) => {
      let A = isNaN(a[sortColumn]) ? a[sortColumn] : Number(a[sortColumn]);
      let B = isNaN(b[sortColumn]) ? b[sortColumn] : Number(b[sortColumn]);
      return sortDir === "asc" ? A - B : B - A;
    });
  } else {
    data.sort((a, b) => Number(a[posKey]) - Number(b[posKey]));
  }

  /* TABLE */
  const app = document.getElementById("app");

  let html = "<table><thead><tr>";

  headers.concat(["STREAK", "LAST5"]).forEach(h => {
    html += `<th onclick="sortTable('${h}')">${h}</th>`;
  });

  html += "</tr></thead><tbody>";

  data.forEach((row, i) => {

    const team = row[teamKey];
    let cls = i < 10 ? "top10" : "";

    if (team?.toLowerCase() === "uncle drew") cls += " highlight-team";

    html += `<tr class="${cls}">`;

    headers.concat(["STREAK", "LAST5"]).forEach(h => {
      let value = row[h] || "";

      if (h === "STREAK") {
        const color = value.startsWith("W") ? "#22c55e" : "#ef4444";
        value = `<span style="color:${color}">${value}</span>`;
      }

      if (h === "LAST5") {
        value = value.split("").map(r =>
          `<span style="color:${r === "W" ? "#22c55e" : "#ef4444"}">${r}</span>`
        ).join(" ");
      }

      html += `<td>${value}</td>`;
    });

    html += "</tr>";
  });

  html += "</tbody></table>";

  app.innerHTML = html;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
