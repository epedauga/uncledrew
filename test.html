<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0b1020, #050816);
    color: white;
  }

  .header {
    padding: 20px;
    text-align: center;
    background: linear-gradient(90deg, #1d4ed8, #7c3aed);
  }

  .header h1 { margin: 0; font-size: 20px; }

  .sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
  }

  /* 🔥 HORIZONTAL FEED */
  #ticker-text {
    margin-top: 12px;
    overflow: hidden;
    position: relative;
  }

  .feed-row {
    display: flex;
    gap: 12px;
    animation: scrollX 40s linear infinite;
  }

  @keyframes scrollX {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* 🧩 CARD CUADRADA */
  .game-card {
    min-width: 160px;
    height: 90px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 12px;
    flex-shrink: 0;
  }

  .date {
    font-size: 10px;
    opacity: 0.7;
  }

  .teams {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    font-size: 13px;
  }

  .score {
    text-align: center;
    font-size: 12px;
    opacity: 0.9;
  }

  .container {
    padding: 12px;
    max-width: 1000px;
    margin: auto;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    overflow: hidden;
  }

  thead { background: rgba(255,255,255,0.08); }

  th {
    padding: 6px 8px;
    font-size: 12px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #93c5fd;
  }

  td {
    padding: 6px 8px;
    font-size: 14px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .top10 {
    background: rgba(34,197,94,0.10);
    border-left: 3px solid #324ade;
  }

  .highlight-team {
    background: rgba(245, 158, 11, 0.22) !important;
    border: 1px solid #f59e0b !important;
  }

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
  <div class="sub">Live data • Google Sheets</div>

  <!-- 🔥 FEED -->
  <div id="ticker-text">Cargando resultados...</div>
</div>

<div class="container">
  <div class="table-wrap" id="app">
    <div class="loading">Cargando standings...</div>
  </div>
</div>

<script>

/* LINKS */
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

/* STREAK */
function calculateStreak(team, games) {
  let type = null;
  let count = 0;

  for (let g of games) {
    const teamA = g["TEAM_A"];
    const teamB = g["TEAM_B"];
    const scoreA = Number(g["SCORE_A"]);
    const scoreB = Number(g["SCORE_B"]);

    if (!teamA || !teamB) continue;

    let result = null;

    if (team === teamA) result = scoreA > scoreB ? "W" : "L";
    else if (team === teamB) result = scoreB > scoreA ? "W" : "L";
    else continue;

    if (!type) { type = result; count = 1; }
    else if (result === type) count++;
    else break;
  }

  return type ? `${type}${count}` : "";
}

async function load() {

  /* RESULTS → HORIZONTAL */
  const textR = await (await fetch(RESULTS_URL)).text();
  const results = textR.trim().split("\n").slice(1).filter(r => r.length > 3);

  const cards = results.map(r => {
    const p = r.split(",");

    return `
      <div class="game-card">
        <div class="date">${p[0] || ""}</div>
        <div class="teams">
          <span>${p[1] || ""}</span>
          <span>${p[2] || ""}</span>
        </div>
        <div class="score">${p[3] || ""}</div>
      </div>
    `;
  }).join("");

  document.getElementById("ticker-text").innerHTML = `
    <div class="feed-row">
      ${cards}
      ${cards}
    </div>
  `;

  /* STANDINGS */
  const text = await (await fetch(URL)).text();
  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0];

  let data = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const textG = await (await fetch(GAMES_URL)).text();
  const rowsG = textG.trim().split("\n").map(r => r.split(","));
  const headersG = rowsG[0];

  const games = rowsG.slice(1).map(r => {
    let obj = {};
    headersG.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const teamKey = headers.find(h => h.includes("TEAM"));
  const posKey = headers[0];

  data.forEach(row => {
    row["STREAK"] = calculateStreak(row[teamKey], games);
  });

  data.sort((a,b) => Number(a[posKey]) - Number(b[posKey]));

  let html = "<table><thead><tr>";
  headers.concat("STREAK").forEach(h => html += `<th>${h}</th>`);
  html += "</tr></thead><tbody>";

  data.forEach((row,i) => {
    let cls = i < 10 ? "top10" : "";
    if ((row[teamKey]||"").toLowerCase() === "uncle drew") cls += " highlight-team";

    html += `<tr class="${cls}">`;
    headers.concat("STREAK").forEach(h => {
      let v = row[h] || "";
      if (h==="STREAK") v = v.startsWith("W") ? "🔥 "+v : "❄️ "+v;
      html += `<td>${v}</td>`;
    });
    html += "</tr>";
  });

  html += "</tbody></table>";
  document.getElementById("app").innerHTML = html;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
