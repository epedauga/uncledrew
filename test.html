<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
.header {
  padding: 18px;
  text-align: center;
  background: #111;
  border-bottom: 1px solid #222;
}

.header h1 {
  margin: 0;
  font-size: 18px;
  letter-spacing: 1px;
}

.sub {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 4px;
}

/* 🔴 LIVE INDICATOR (PRO) */
.live-indicator {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 600;
  color: #C21E56;
  letter-spacing: 0.5px;
}

.live-indicator::before {
  content: "●";
  color: #C21E56;
  margin-right: 6px;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* RESET BUTTON */
.reset-btn {
  margin-top: 10px;
  background: #151515;
  color: #aaa;
  border: 1px solid #222;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

.reset-btn:hover {
  color: #fff;
  border-color: #333;
}

/* TICKER */
#ticker-text {
  margin-top: 10px;
  overflow: hidden;
  position: relative;
  padding: 10px 0;
  border-top: 1px solid #1c1c1c;
}

.feed-wrapper {
  display: flex;
  gap: 12px;
  width: max-content;
  animation: scrollX 80s linear infinite;
}

@keyframes scrollX {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* GAME CARD */
.game-card {
  min-width: 220px;
  background: #151515;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.4;

  box-shadow: 0 0 0 1px rgba(194, 30, 86, 0.35);
}

.game-card:hover {
  background: #1c1c1c;
  box-shadow: 0 0 0 1px rgba(194, 30, 86, 0.6);
}

.game-card div:first-child {
  opacity: 0.6;
  font-size: 11px;
}

/* CONTAINER */
.container {
  padding: 12px;
  max-width: 1000px;
  margin: auto;
}

/* TABLE */
.table-wrap {
  overflow-x: auto;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 520px;
  background: #0f0f0f;
  border: 1px solid #222;
  border-radius: 10px;
  overflow: hidden;
}

thead {
  background: #111;
}

th {
  padding: 6px 8px;
  font-size: 12px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #aaa;
  cursor: pointer;
}

th:hover {
  color: #fff;
}

td {
  padding: 6px 8px;
  font-size: 14px;
  text-align: center;
  border-top: 1px solid #1c1c1c;
}

tbody tr:hover {
  background: rgba(255,255,255,0.03);
}

/* TOP 10 */
.top10 {
  background: rgba(255,255,255,0.03);
  border-left: 3px solid #C21E56;
}

/* UNCLE DREW */
.highlight-team td {
  background: rgba(255, 140, 66, 0.14) !important;
}

.highlight-team td:first-child {
  border-left: 4px solid #ff8c42;
}

.highlight-team td:nth-child(2) {
  font-weight: 700;
  color: #fff;
}

.highlight-team {
  box-shadow: inset 0 0 0 1px rgba(255, 140, 66, 0.35);
}

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>

  <div class="sub">Live data • Google Sheets</div>

  <!-- 🔴 LIVE INDICATOR -->
  <div class="live-indicator">LIVE</div>

  <button class="reset-btn" onclick="resetSort()">Reset order</button>

  <div id="ticker-text">Cargando resultados...</div>
</div>

<div class="container">
  <div class="table-wrap" id="app">
    <div class="loading">Cargando standings...</div>
  </div>
</div>

<script>

/* LINKS */
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

let sortColumn = null;
let sortDir = "desc";

/* RESET */
function resetSort() {
  sortColumn = null;
  sortDir = "desc";
  load();
}

/* SORT */
function sortTable(col) {
  if (sortColumn === col) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortColumn = col;
    sortDir = "desc";
  }
  load();
}

/* STREAK */
function calculateStreak(team, games) {
  let type = null;
  let count = 0;

  for (let g of games) {

    const teamA = g["TEAM_A"];
    const teamB = g["TEAM_B"];

    const scoreA = Number(g["SCORE_A"]) || 0;
    const scoreB = Number(g["SCORE_B"]) || 0;

    if (!teamA || !teamB) continue;

    let result = null;

    if (team === teamA) result = scoreA > scoreB ? "W" : "L";
    else if (team === teamB) result = scoreB > scoreA ? "W" : "L";
    else continue;

    if (!type) {
      type = result;
      count = 1;
    } else if (result === type) {
      count++;
    } else break;
  }

  return type ? `${type}${count}` : "";
}

function smartValue(v) {
  if (v === undefined || v === null) return 0;
  if (!isNaN(v)) return Number(v);
  return v;
}

async function load() {
  try {

    const text = await (await fetch(URL)).text();
    const rows = text.trim().split("\n").map(r => r.split(","));

    const headers = rows[0].map(h => h.trim());

    let data = rows.slice(1).map(r => {
      let obj = {};
      headers.forEach((h, i) => obj[h] = r[i]?.trim());
      return obj;
    });

    const textG = await (await fetch(GAMES_URL)).text();
    const rowsG = textG.trim().split("\n").map(r => r.split(","));

    const headersG = rowsG[0].map(h => h.trim());

    const games = rowsG.slice(1).map(r => {
      let obj = {};
      headersG.forEach((h, i) => obj[h] = r[i]?.trim());
      return obj;
    });

    const textR = await (await fetch(RESULTS_URL)).text();
    const results = textR.trim().split("\n").slice(1).filter(r => r.length > 3);

    const ticker = document.getElementById("ticker-text");

    const cards = results.map(r => {
      const p = r.split(",");

      return `
        <div class="game-card">
          <div>${p[0] || ""}</div>
          <div><b>${p[1] || ""}</b> ${p[2] || ""}</div>
          <div>${p[3] || ""}</div>
        </div>
      `;
    }).join("");

    ticker.innerHTML = `
      <div class="feed-wrapper">
        ${cards}
        ${cards}
      </div>
    `;

    const posKey = headers[0];
    const teamKey = headers.find(h => h.includes("TEAM"));

    data.forEach(row => {
      row["STREAK"] = calculateStreak(row[teamKey], games);
    });

    if (sortColumn) {
      data.sort((a, b) => {
        let A = smartValue(a[sortColumn]);
        let B = smartValue(b[sortColumn]);

        if (typeof A === "number" && typeof B === "number") {
          return sortDir === "asc" ? A - B : B - A;
        }

        return sortDir === "asc"
          ? String(A).localeCompare(String(B))
          : String(B).localeCompare(String(A));
      });
    } else {
      data.sort((a, b) => Number(a[posKey]) - Number(b[posKey]));
    }

    render([...headers, "STREAK"], data, teamKey);

  } catch (e) {
    console.error(e);
  }
}

function render(headers, data, teamKey) {
  const app = document.getElementById("app");

  let html = "<table><thead><tr>";

  headers.forEach(h => {
    html += `<th onclick="sortTable('${h}')" ondblclick="resetSort()">${h}</th>`;
  });

  html += "</tr></thead><tbody>";

  data.forEach((row, i) => {

    let cls = i < 10 ? "top10" : "";
    const team = row[teamKey] || "";

    if (team.toLowerCase() === "uncle drew") {
      cls += " highlight-team";
    }

    html += `<tr class="${cls}">`;

    headers.forEach(h => {
      let value = row[h] || "";

      if (h === "STREAK") {
        const isWin = value.startsWith("W");
        const color = isWin ? "#22c55e" : "#ef4444";

        value = `<span style="color:${color};font-weight:400;">${value}</span>`;
      }

      html += `<td>${value}</td>`;
    });

    html += "</tr>";
  });

  html += "</tbody></table>";
  app.innerHTML = html;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
