<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0b1020, #050816);
    color: white;
  }

  .header {
    padding: 20px;
    text-align: center;
    background: linear-gradient(90deg, #1d4ed8, #7c3aed);
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
  }

  .sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
  }

  /* 🔥 SCOREBOARD FEED */
  #ticker-text {
    margin-top: 12px;
    overflow: hidden;
    position: relative;
  }

  .feed-row {
    display: flex;
    gap: 12px;
    animation: scrollX 45s linear infinite;
    width: max-content;
  }

  @keyframes scrollX {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* 🏀 SCOREBOARD CARD PRO */
  .game-card {
    min-width: 240px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .matchup {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
  }

  .team {
    width: 80px;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }

  .score-box {
    background: rgba(255,255,255,0.08);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    min-width: 50px;
  }

  .date {
    font-size: 10px;
    opacity: 0.6;
  }

  /* 🟢🔴 WIN / LOSS */
  .win {
    color: #22c55e;
  }

  .loss {
    color: #ef4444;
    opacity: 0.7;
  }

  /* TABLE (NO TOCAMOS MUCHO) */
  .container {
    padding: 12px;
    max-width: 1000px;
    margin: auto;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    overflow: hidden;
  }

  thead {
    background: rgba(255,255,255,0.08);
  }

  th {
    padding: 6px 8px;
    font-size: 12px;
    text-align: center;
    text-transform: uppercase;
    color: #93c5fd;
  }

  td {
    padding: 6px 8px;
    font-size: 14px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .top10 {
    background: rgba(34,197,94,0.10);
  }

  .highlight-team {
    background: rgba(245, 158, 11, 0.22) !important;
  }

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
  <div class="sub">Live data • Google Sheets</div>

  <div id="ticker-text">Cargando resultados...</div>
</div>

<div class="container">
  <div class="table-wrap" id="app"></div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

/* FEED */
async function load() {

  const textR = await (await fetch(RESULTS_URL)).text();
  const results = textR.trim().split("\n").slice(1).filter(r => r.length > 3);

  const cards = results.map(r => {
    const p = r.split(",");

    const date = p[0] || "";
    const teamA = p[1] || "";
    const teamB = p[2] || "";
    const score = p[3] || "";

    let scoreA = "", scoreB = "";

    if (score.includes("-")) {
      [scoreA, scoreB] = score.split("-");
    }

    let aClass = "", bClass = "";

    if (Number(scoreA) > Number(scoreB)) {
      aClass = "win";
      bClass = "loss";
    } else if (Number(scoreB) > Number(scoreA)) {
      bClass = "win";
      aClass = "loss";
    }

    return `
      <div class="game-card">

        <div class="date">${date}</div>

        <div class="matchup">
          <div class="team ${aClass}">${teamA}</div>

          <div class="score-box">
            ${scoreA || "0"} - ${scoreB || "0"}
          </div>

          <div class="team ${bClass}">${teamB}</div>
        </div>

      </div>
    `;
  }).join("");

  document.getElementById("ticker-text").innerHTML = `
    <div class="feed-row">
      ${cards}
      ${cards}
    </div>
  `;

}

load();
setInterval(load, 30000);

</script>

</body>
</html>
