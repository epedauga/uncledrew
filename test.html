<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0b1020, #050816);
    color: white;
  }

  .header {
    padding: 20px;
    text-align: center;
    background: linear-gradient(90deg, #1d4ed8, #7c3aed);
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
  }

  .sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
  }

  /* 🔥 FEED PRO */
  #ticker-text {
    margin-top: 10px;
    height: 170px;
    overflow: hidden;
    position: relative;
  }

  .feed-wrapper {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: floatFeed 28s linear infinite;
  }

  @keyframes floatFeed {
    0% { transform: translateY(0); }
    100% { transform: translateY(-50%); }
  }

  /* 🏀 SCORECARD PRO */
  .game-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 14px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .game-top {
    font-size: 10px;
    opacity: 0.6;
  }

  .matchup {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
  }

  .team {
    width: 90px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score {
    background: rgba(255,255,255,0.08);
    padding: 3px 10px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 12px;
    min-width: 60px;
    text-align: center;
  }

  .win { color: #22c55e; }
  .loss { color: #ef4444; opacity: 0.7; }

  .container {
    padding: 12px;
    max-width: 1000px;
    margin: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    overflow: hidden;
  }

  thead {
    background: rgba(255,255,255,0.08);
  }

  th {
    padding: 6px 8px;
    font-size: 12px;
    text-align: center;
    color: #93c5fd;
  }

  td {
    padding: 6px 8px;
    font-size: 14px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .top10 {
    background: rgba(34,197,94,0.10);
  }

  .highlight-team {
    background: rgba(245, 158, 11, 0.22) !important;
  }

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
  <div class="sub">Live data • Google Sheets</div>

  <div id="ticker-text">Cargando resultados...</div>
</div>

<div class="container">
  <div id="app"></div>
</div>

<script>

/* LINKS */
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

let sortColumn = null;
let sortDir = "desc";

/* STREAK */
function calculateStreak(team, games) {
  let type = null;
  let count = 0;

  for (let g of games) {

    const teamA = g["TEAM_A"];
    const teamB = g["TEAM_B"];

    const scoreA = Number(g["SCORE_A"]);
    const scoreB = Number(g["SCORE_B"]);

    if (!teamA || !teamB) continue;

    let result = null;

    if (team === teamA) result = scoreA > scoreB ? "W" : "L";
    else if (team === teamB) result = scoreB > scoreA ? "W" : "L";
    else continue;

    if (!type) {
      type = result;
      count = 1;
    } else if (result === type) {
      count++;
    } else break;
  }

  return type ? `${type}${count}` : "";
}

/* LOAD */
async function load() {

  const text = await (await fetch(URL)).text();
  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0].map(h => h.trim());

  let data = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]?.trim());
    return obj;
  });

  const textG = await (await fetch(GAMES_URL)).text();
  const rowsG = textG.trim().split("\n").map(r => r.split(","));
  const headersG = rowsG[0].map(h => h.trim());

  const games = rowsG.slice(1).map(r => {
    let obj = {};
    headersG.forEach((h, i) => obj[h] = r[i]?.trim());
    return obj;
  });

  /* FEED PRO */
  const textR = await (await fetch(RESULTS_URL)).text();
  const results = textR.trim().split("\n").slice(1).filter(r => r.length > 3);

  const ticker = document.getElementById("ticker-text");

  const cards = results.map(r => {
    const p = r.split(",");

    const date = p[0] || "";
    const teamA = p[1] || "";
    const teamB = p[2] || "";
    const score = p[3] || "0-0";

    let [a, b] = score.includes("-") ? score.split("-") : ["0","0"];

    const aWin = Number(a) > Number(b);
    const bWin = Number(b) > Number(a);

    return `
      <div class="game-card">

        <div class="game-top">${date}</div>

        <div class="matchup">

          <div class="team ${aWin ? 'win' : 'loss'}">${teamA}</div>

          <div class="score">${a}-${b}</div>

          <div class="team ${bWin ? 'win' : 'loss'}">${teamB}</div>

        </div>

      </div>
    `;
  }).join("");

  ticker.innerHTML = `
    <div class="feed-wrapper">
      ${cards}
      ${cards}
    </div>
  `;

  const posKey = headers[0];
  const teamKey = headers.find(h => h.includes("TEAM"));

  data.forEach(row => {
    row["STREAK"] = calculateStreak(row[teamKey], games);
  });

  data.sort((a, b) => Number(a[posKey]) - Number(b[posKey]));

  render([...headers, "STREAK"], data, teamKey);
}

/* RENDER TABLE */
function render(headers, data, teamKey) {

  const app = document.getElementById("app");

  let html = "<table><thead><tr>";

  headers.forEach(h => html += `<th>${h}</th>`);

  html += "</tr></thead><tbody>";

  data.forEach((row, i) => {

    let cls = i < 10 ? "top10" : "";
    const team = row[teamKey] || "";

    if (team.toLowerCase() === "uncle drew") {
      cls += " highlight-team";
    }

    html += `<tr class="${cls}">`;

    headers.forEach(h => {

      let value = row[h] || "";

      if (h === "STREAK") {
        const isWin = value.startsWith("W");
        const color = isWin ? "#22c55e" : "#ef4444";
        value = `<span style="color:${color};font-weight:500">${value}</span>`;
      }

      html += `<td>${value}</td>`;
    });

    html += "</tr>";
  });

  html += "</tbody></table>";
  app.innerHTML = html;
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
