<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

const RESULTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=868310309&single=true&output=csv";

let sortColumn = null;
let sortDir = "desc";

function getStatusEmoji(i) {
  if (i === 0) return "🏆";
  if (i < 7) return "🟢";
  if (i < 15) return "⚠️";
  return "☠️";
}

/* 🛠 CSV PARSER SEGURO */
function parseCSV(text) {
  const rows = text.trim().split("\n");
  return rows.map(r =>
    r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c =>
      c.replace(/^"|"$/g, "").trim()
    )
  );
}

/* 🔥 STREAK */
function calculateStreak(team, games) {
  let type = null;
  let count = 0;

  for (let g of games) {
    const teamA = g["TEAM A"] || g["Team A"];
    const teamB = g["TEAM B"] || g["Team B"];
    const scoreA = Number(g["SCORE A"] || g["Score A"]);
    const scoreB = Number(g["SCORE B"] || g["Score B"]);

    if (!teamA || !teamB) continue;

    let result = null;

    if (team === teamA) {
      result = scoreA > scoreB ? "W" : "L";
    } else if (team === teamB) {
      result = scoreB > scoreA ? "W" : "L";
    } else continue;

    if (!type) {
      type = result;
      count = 1;
    } else if (result === type) {
      count++;
    } else break;
  }

  return type ? `${type}${count}` : "";
}

async function load() {
  try {

    /* 🏀 STANDINGS */
    const text = await (await fetch(URL)).text();
    const rows = parseCSV(text);

    const headers = rows[0];
    let data = rows.slice(1).map(r => {
      let obj = {};
      headers.forEach((h, i) => obj[h] = r[i] || "");
      return obj;
    });

    /* 🔥 GAMES */
    const textG = await (await fetch(GAMES_URL)).text();
    const rowsG = parseCSV(textG);

    const headersG = rowsG[0];
    const games = rowsG.slice(1).map(r => {
      let obj = {};
      headersG.forEach((h, i) => obj[h] = r[i] || "");
      return obj;
    });

    /* 🔥 RESULTS */
    const textR = await (await fetch(RESULTS_URL)).text();
    const results = parseCSV(textR)
      .slice(1)
      .map(r => r[0])
      .filter(r => r && r.length > 3);

    document.getElementById("ticker-text").innerText =
      results.join("   •   ");

    const posKey = headers[0];
    const teamKey = headers.find(h => h.toLowerCase().includes("team"));

    /* 🔥 STREAK */
    data.forEach(row => {
      row["STREAK"] = calculateStreak(row[teamKey], games);
    });

    /* 📊 SORT */
    if (sortColumn) {
      data.sort((a, b) => {
        let A = a[sortColumn];
        let B = b[sortColumn];

        const nA = Number(A);
        const nB = Number(B);

        if (!isNaN(nA) && !isNaN(nB)) {
          return sortDir === "asc" ? nA - nB : nB - nA;
        }

        return sortDir === "asc"
          ? A.localeCompare(B)
          : B.localeCompare(A);
      });
    } else {
      data.sort((a, b) => Number(a[posKey]) - Number(b[posKey]));
    }

    render([...headers, "STREAK"], data, teamKey);

  } catch (err) {
    console.error(err);
    document.getElementById("app").innerHTML =
      "<div class='loading'>Error cargando datos</div>";
  }
}

function sortBy(column) {
  if (sortColumn === column) {
    sortDir = sortDir === "asc" ? "desc" : "asc";
  } else {
    sortColumn = column;
    sortDir = "desc";
  }
  load();
}

function render(headers, data, teamKey) {
  const app = document.getElementById("app");

  let html = "<table><thead><tr>";

  headers.forEach(h => {
    let arrow = h === sortColumn ? (sortDir === "asc" ? " ▲" : " ▼") : "";
    html += `<th onclick="sortBy('${h}')">${h}${arrow}</th>`;
  });

  html += "</tr></thead><tbody>";

  data.forEach((row, i) => {
    let cls = i < 10 ? "top10" : "";

    const team = row[teamKey] || "";
    if (team.toLowerCase() === "uncle drew") {
      cls += " highlight-team";
    }

    html += `<tr class="${cls}">`;

    headers.forEach(h => {
      let value = row[h] || "";

      if (h === "STREAK" && value) {
        value = value.startsWith("W") ? `🔥 ${value}` : `❄️ ${value}`;
      }

      if (h === teamKey && team.toLowerCase() === "uncle drew") {
        value = `${getStatusEmoji(i)} ${value}`;
      }

      html += `<td>${value}</td>`;
    });

    html += "</tr>";
  });

  html += "</tbody></table>";
  app.innerHTML = html;
}

load();
setInterval(load, 30000);

</script>
