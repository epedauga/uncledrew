<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
.header {
  padding: 18px;
  text-align: center;
  background: #111;
  border-bottom: 1px solid #222;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  letter-spacing: 1px;
}

.data-source {
  margin-top: 4px;
  font-size: 11px;
  opacity: 0.4;
}

.live-indicator {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 600;
  color: #C21E56;
}

.reset-btn {
  margin-top: 10px;
  background: #151515;
  color: #aaa;
  border: 1px solid #222;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

/* TABLE */
.container {
  padding: 12px;
  max-width: 1000px;
  margin: auto;
}

.table-wrap {
  overflow-x: auto;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 520px;
  background: #0f0f0f;
  border: 1px solid #222;
  table-layout: auto;
}

thead {
  background: #111;
}

th {
  padding: 6px 8px;
  font-size: 12px;
  text-transform: uppercase;
  color: #aaa;
  cursor: pointer;
  background: rgba(255,255,255,0.04);
  white-space: nowrap;
}

td {
  padding: 6px 8px;
  font-size: 14px;
  text-align: center;
  border-top: 1px solid #1c1c1c;
}

tbody tr:hover {
  background: rgba(255,255,255,0.03);
}

.top10 {
  background: rgba(255,255,255,0.07);
}

.highlight-team td {
  background: rgba(255, 140, 66, 0.14) !important;
}

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
  <div class="data-source">Data source: Google Sheets</div>
  <div class="live-indicator">LIVE</div>
  <button class="reset-btn" onclick="resetSort()">Reset order</button>
</div>

<div class="container">
  <div class="table-wrap" id="app">Cargando...</div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

const GAMES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1179427139&single=true&output=csv";

let sortColumn = null;
let sortDir = "desc";

/* FIX CSV (ESTO ES LO QUE TE ROMPÍA TODO) */
function parseCSV(text) {
  return text
    .trim()
    .split("\n")
    .map(row => row.split(",").map(v => v.trim()));
}

/* RESET */
function resetSort() {
  sortColumn = null;
  sortDir = "desc";
  load();
}

/* STREAK */
function calculateStreak(team, games) {
  let type = null;
  let count = 0;

  for (let g of games) {
    const teamA = g["TEAM_A"];
    const teamB = g["TEAM_B"];

    const scoreA = Number(g["SCORE_A"]) || 0;
    const scoreB = Number(g["SCORE_B"]) || 0;

    if (!teamA || !teamB) continue;

    let result = null;

    if (team === teamA) result = scoreA > scoreB ? "W" : "L";
    else if (team === teamB) result = scoreB > scoreA ? "W" : "L";
    else continue;

    if (!type) {
      type = result;
      count = 1;
    } else if (result === type) {
      count++;
    } else break;
  }

  return type ? `${type}${count}` : "";
}

/* LAST 5 SIMPLE (SIN COLORES) */
function calculateLast5(team, games) {
  let res = [];

  for (let g of games) {
    const teamA = g["TEAM_A"];
    const teamB = g["TEAM_B"];

    const scoreA = Number(g["SCORE_A"]) || 0;
    const scoreB = Number(g["SCORE_B"]) || 0;

    if (!teamA || !teamB) continue;

    let result = null;

    if (team === teamA) result = scoreA > scoreB ? "W" : "L";
    else if (team === teamB) result = scoreB > scoreA ? "W" : "L";
    else continue;

    res.push(result);
    if (res.length === 5) break;
  }

  const wins = res.filter(r => r === "W").length;
  const losses = res.length - wins;

  return `${wins}-${losses}`;
}

/* LOAD */
async function load() {

  const text = await (await fetch(URL)).text();
  const rows = parseCSV(text);

  const headers = rows[0];

  let data = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i] || "");
    return obj;
  });

  const textG = await (await fetch(GAMES_URL)).text();
  const rowsG = parseCSV(textG);

  const headersG = rowsG[0];

  const games = rowsG.slice(1).map(r => {
    let obj = {};
    headersG.forEach((h, i) => obj[h] = r[i] || "");
    return obj;
  });

  const posKey = headers[0];
  const teamKey = headers.find(h => h.includes("TEAM"));

  data.forEach(row => {
    row["STREAK"] = calculateStreak(row[teamKey], games);
    row["LAST5"] = calculateLast5(row[teamKey], games);
  });

  if (sortColumn) {
    data.sort((a, b) => {
      let A = isNaN(a[sortColumn]) ? a[sortColumn] : Number(a[sortColumn]);
      let B = isNaN(b[sortColumn]) ? b[sortColumn] : Number(b[sortColumn]);
      return sortDir === "asc" ? A - B : B - A;
    });
  } else {
    data.sort((a, b) => Number(a[posKey]) - Number(b[posKey]));
  }

  const app = document.getElementById("app");

  let html = "<table><thead><tr>";

  headers.concat(["STREAK", "LAST5"]).forEach(h => {
    const title = h === "LAST5" ? "LAST 5" : h;
    html += `<th onclick="sortTable('${h}')">${title}</th>`;
  });

  html += "</tr></thead><tbody>";

  data.forEach((row, i) => {

    const team = row[teamKey];
    let cls = i < 10 ? "top10" : "";

    if (team?.toLowerCase() === "uncle drew") cls += " highlight-team";

    html += `<tr class="${cls}">`;

    headers.concat(["STREAK", "LAST5"]).forEach(h => {
      let value = row[h] || "";
      html += `<td>${value}</td>`;
    });

    html += "</tr>";
  });

  html += "</tbody></table>";

  app.innerHTML = html;
}

load();

setInterval(() => {
  load();
}, 30000);

</script>

</body>
</html>
