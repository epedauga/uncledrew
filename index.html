<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 League Standings</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #111827, #050816);
    color: white;
  }

  /* HEADER NBA STYLE */
  .header {
    padding: 20px;
    text-align: center;
    background: linear-gradient(90deg, #1d4ed8, #9333ea);
    font-weight: bold;
    letter-spacing: 1px;
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
  }

  .sub {
    font-size: 12px;
    opacity: 0.8;
  }

  /* CONTAINER */
  .container {
    padding: 15px;
    max-width: 600px;
    margin: auto;
  }

  /* CARD */
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(10px);
  }

  .left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .rank {
    font-size: 14px;
    width: 25px;
    text-align: center;
    font-weight: bold;
    color: #60a5fa;
  }

  .team {
    font-weight: 600;
  }

  .record {
    font-size: 13px;
    opacity: 0.8;
  }

  /* TOP TEAM HIGHLIGHT */
  .top {
    border: 1px solid #22c55e;
    box-shadow: 0 0 15px rgba(34,197,94,0.2);
  }

  /* PLAYOFF ZONE */
  .playoff {
    border-left: 3px solid #3b82f6;
  }

  /* MOBILE OPTIMIZED */
  @media (max-width: 480px) {
    .card {
      padding: 10px;
    }
  }
</style>
</head>

<body>

<div class="header">
  <h1>🏀 LEAGUE STANDINGS</h1>
  <div class="sub">Season 2026 • Live Ranking</div>
</div>

<div class="container" id="table"></div>

<script>
// 🔥 PEGÁ ACÁ TU DATA (por ahora mock, después lo conectamos a Sheets)
const data = [
  { team: "Lakers", wins: 10, losses: 2 },
  { team: "Celtics", wins: 9, losses: 3 },
  { team: "Warriors", wins: 8, losses: 4 },
  { team: "Bulls", wins: 6, losses: 6 },
  { team: "Heat", wins: 5, losses: 7 },
  { team: "Knicks", wins: 4, losses: 8 },
];

function render() {
  const sorted = data.sort((a,b) => b.wins - a.wins);
  const container = document.getElementById("table");

  container.innerHTML = "";

  sorted.forEach((t, i) => {
    const div = document.createElement("div");

    let cls = "card";
    if (i === 0) cls += " top";
    if (i < 4) cls += " playoff";

    div.className = cls;

    div.innerHTML = `
      <div class="left">
        <div class="rank">${i+1}</div>
        <div>
          <div class="team">${t.team}</div>
          <div class="record">${t.wins}W - ${t.losses}L</div>
        </div>
      </div>
      <div style="opacity:.7;font-size:12px;">
        ${ (t.wins / (t.wins + t.losses)).toFixed(2) }
      </div>
    `;

    container.appendChild(div);
  });
}

render();
</script>

</body>
</html>
