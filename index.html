<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🏀 Standings</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 30px;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  .card {
    max-width: 900px;
    margin: auto;
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    overflow: hidden;
    border-radius: 10px;
  }

  th, td {
    padding: 12px;
    text-align: center;
  }

  th {
    background: #1f2937;
    color: #93c5fd;
    text-transform: uppercase;
    font-size: 12px;
  }

  tr {
    border-bottom: 1px solid #1f2937;
  }

  tr:hover {
    background: #1e293b;
  }

  .rank {
    font-weight: bold;
    color: #22c55e;
  }
</style>
</head>

<body>

<h1>🏀 Standings</h1>

<div class="card">
  <table id="standings"></table>
</div>

<script>
const url = "PEGÁ_ACÁ_TU_LINK_CSV";

fetch(url)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").map(r => r.split(","));
    
    let html = "";

    rows.forEach((row, i) => {
      html += "<tr>";

      row.forEach((cell, j) => {
        if (i === 0) {
          html += `<th>${cell}</th>`;
        } else {
          html += `<td class="${j === 0 ? 'rank' : ''}">${cell}</td>`;
        }
      });

      html += "</tr>";
    });

    document.getElementById("standings").innerHTML = html;
  });
</script>

</body>
</html>
