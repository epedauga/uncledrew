<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0b1020, #050816);
    color: white;
  }

  .header {
    padding: 22px;
    text-align: center;
    background: linear-gradient(90deg, #1d4ed8, #7c3aed);
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
    letter-spacing: 1px;
  }

  .sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
  }

  .container {
    max-width: 600px;
    margin: auto;
    padding: 12px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
  }

  .left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .rank {
    width: 28px;
    text-align: center;
    font-weight: bold;
    color: #60a5fa;
  }

  .team {
    font-weight: 600;
  }

  .record {
    font-size: 12px;
    opacity: 0.75;
  }

  .top {
    border: 1px solid #22c55e;
    box-shadow: 0 0 12px rgba(34,197,94,0.2);
  }

  .playoff {
    border-left: 3px solid #3b82f6;
  }

  .loading {
    text-align: center;
    opacity: 0.7;
    margin-top: 40px;
  }
</style>
</head>

<body>

<div class="header">
  <h1>🏀 LEAGUE STANDINGS</h1>
  <div class="sub">Live Ranking • Season 2026</div>
</div>

<div class="container" id="app">
  <div class="loading">Cargando standings...</div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

async function loadData() {
  const res = await fetch(URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));

  // asumimos:
  // col 0 = team
  // col 1 = wins
  // col 2 = losses

  const data = rows.slice(1).map(r => ({
    team: r[0],
    wins: parseInt(r[1]) || 0,
    losses: parseInt(r[2]) || 0
  }));

  data.sort((a,b) => b.wins - a.wins);

  render(data);
}

function render(data) {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach((t, i) => {
    const div = document.createElement("div");

    let cls = "card";
    if (i === 0) cls += " top";
    if (i < 4) cls += " playoff";

    const pct = (t.wins / (t.wins + t.losses)).toFixed(2);

    div.className = cls;

    div.innerHTML = `
      <div class="left">
        <div class="rank">${i + 1}</div>
        <div>
          <div class="team">${t.team}</div>
          <div class="record">${t.wins}W - ${t.losses}L</div>
        </div>
      </div>
      <div style="font-size:12px; opacity:.7;">
        ${pct}
      </div>
    `;

    app.appendChild(div);
  });
}

loadData();
</script>

</body>
</html>
