<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0b1020, #050816);
    color: white;
  }

  .header {
    padding: 20px;
    text-align: center;
    background: linear-gradient(90deg, #1d4ed8, #7c3aed);
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
  }

  .sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
  }

  .container {
    padding: 12px;
    max-width: 1000px;
    margin: auto;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    overflow: hidden;
  }

  thead {
    background: rgba(255,255,255,0.08);
  }

  th {
    padding: 6px 8px;
    font-size: 12px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #93c5fd;
  }

  td {
    padding: 6px 8px;
    font-size: 14px; /* 💻 desktop */
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  tr:hover {
    background: rgba(255,255,255,0.03);
  }

  td:first-child {
    font-weight: bold;
    color: #60a5fa;
  }

  .top10 {
    background: rgba(34,197,94,0.10);
    border-left: 3px solid #324ade;
  }

  .highlight-team {
    background: rgba(245, 158, 11, 0.22) !important;
    border: 1px solid #f59e0b !important;
    box-shadow: 0 0 10px rgba(245, 158, 11, 0.25);
  }

  .loading {
    text-align: center;
    opacity: 0.7;
    margin-top: 40px;
  }

  /* 📱 MOBILE */
  @media (max-width: 300px) {
    td {
      font-size: 11px;
      padding: 5px 6px;
    }

    th {
      font-size: 10px;
      padding: 5px 6px;
    }

    table {
      min-width: 420px;
    }
  }

</style>
</head>

<body>

<div class="header">
  <h1>🏀 STANDINGS</h1>
  <div class="sub">Live data • Google Sheets</div>
</div>

<div class="container">
  <div class="table-wrap" id="app">
    <div class="loading">Cargando standings...</div>
  </div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

/* 🧠 EMOJIS POR POSICIÓN */
function getStatusEmoji(i) {
  if (i === 0) return "🏆";
  if (i < 10) return "🟢";
  if (i < 15) return "🔴";
  return "☠️";
}

async function load() {
  const res = await fetch(URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));

  const headers = rows[0].map(h => h.trim());
  const dataRows = rows.slice(1);

  const data = dataRows.map(row => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = row[i] ? row[i].trim() : "";
    });
    return obj;
  });

  render(headers, data);
}

function render(headers, data) {
  const app = document.getElementById("app");

  let html = "<table>";

  html += "<thead><tr>";
  headers.forEach(h => html += `<th>${h}</th>`);
  html += "</tr></thead>";

  html += "<tbody>";

  const teamKey = headers.find(h =>
    h.toLowerCase().includes("team")
  );

  data.forEach((row, i) => {

    let cls = "";

    if (i < 10) cls += " top10";

    const teamName = teamKey ? row[teamKey] : "";

    const isUncleDrew =
      teamName &&
      teamName.toString().trim().toLowerCase() === "uncle drew";

    if (isUncleDrew) cls += " highlight-team";

    html += `<tr class="${cls}">`;

    headers.forEach(h => {
      let value = row[h];

      // ⭐ EMOJI SOLO UNCLE DREW
      if (teamKey && h === teamKey && isUncleDrew) {
        value = `${getStatusEmoji(i)} ${value}`;
      }

      html += `<td>${value}</td>`;
    });

    html += "</tr>";
  });

  html += "</tbody></table>";

  app.innerHTML = html;
}

load();

</script>

</body>
</html>
