<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings - Uncle Drew’s season</title>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0a0a0a;
  color: #fff;
}

/* HEADER */
.header {
  padding: 18px;
  text-align: center;
  background: #111;
  border-bottom: 1px solid #222;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  letter-spacing: 1px;
}

/* TABLA */
table {
  width: 100%;
  border-collapse: collapse;
  background: #0f0f0f;
}

th, td {
  padding: 8px;
  text-align: center;
}

tr:hover {
  background: rgba(255,255,255,0.03);
}

/* TOP 10 */
.top10 {
  background: rgba(255,255,255,0.07);
  border-left: 3px solid #C21E56;
}

/* 🟣 SELECCIÓN USUARIO (NUEVO) */
.selected-team td {
  background: rgba(194, 30, 86, 0.18) !important;
}

.selected-team td:first-child::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: #C21E56;
}

/* UNCLE DREW */
.highlight-team td {
  background: rgba(255, 140, 66, 0.15);
}

/* MOBILE (lo dejamos igual que tenías) */
@media (max-width: 768px) {

  thead th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #111;
  }

  th:first-child, td:first-child {
    position: sticky;
    left: 0;
    background: #0f0f0f;
    z-index: 10;
  }

  th:nth-child(2), td:nth-child(2) {
    position: sticky;
    left: 45px;
    background: #0f0f0f;
    z-index: 11;
  }

}

</style>
</head>

<body>

<div class="header">
  <h1>STANDINGS</h1>
</div>

<div id="app"></div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

let selectedTeam = localStorage.getItem("selectedTeam") || null;

async function load() {

  const text = await (await fetch(URL)).text();
  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0];

  let html = "<table><thead><tr>";
  headers.forEach(h => html += `<th>${h}</th>`);
  html += "</tr></thead><tbody>";

  rows.slice(1).forEach((row, i) => {

    const team = row[1];

    let cls = i < 10 ? "top10" : "";

    // AUTO HIGHLIGHT (opcional)
    const AUTO_HIGHLIGHT = false;
    if (AUTO_HIGHLIGHT && team?.toLowerCase() === "uncle drew") {
      cls += " highlight-team";
    }

    // SELECCIÓN USUARIO
    if (selectedTeam === team) {
      cls += " selected-team";
    }

    html += `<tr class="${cls}" onclick="selectTeam('${team}')">`;

    row.forEach(cell => {
      html += `<td>${cell}</td>`;
    });

    html += "</tr>";
  });

  html += "</tbody></table>";

  document.getElementById("app").innerHTML = html;
}

/* 🔥 CLICK SELECCIÓN */
function selectTeam(team) {
  selectedTeam = team;
  localStorage.setItem("selectedTeam", team);
  load();
}

load();

</script>

</body>
</html>
