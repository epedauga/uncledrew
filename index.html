<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 Standings</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: radial-gradient(circle at top, #0b1020, #050816);
    color: white;
  }

  .header {
    padding: 22px;
    text-align: center;
    background: linear-gradient(90deg, #1d4ed8, #7c3aed);
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
    letter-spacing: 1px;
  }

  .sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
  }

  .container {
    max-width: 700px;
    margin: auto;
    padding: 12px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 10px;
    backdrop-filter: blur(10px);
  }

  .rowTop {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .rank {
    font-weight: bold;
    color: #60a5fa;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 12px;
  }

  .field {
    font-size: 12px;
    opacity: 0.7;
  }

  .value {
    font-size: 13px;
    font-weight: 500;
  }

  .top {
    border: 1px solid #22c55e;
  }

  .playoff {
    border-left: 3px solid #3b82f6;
  }

  .loading {
    text-align: center;
    opacity: 0.7;
    margin-top: 40px;
  }
</style>
</head>

<body>

<div class="header">
  <h1>🏀 LEAGUE STANDINGS</h1>
  <div class="sub">Live data from Google Sheets</div>
</div>

<div class="container" id="app">
  <div class="loading">Cargando data...</div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0iNd0VR_AOqMzHOiRMKnZ36aWPsiMYNBZCFbTLa15ghmjqw_2nrrhHTwFvmWLg/pub?gid=1380606206&single=true&output=csv";

async function load() {
  const res = await fetch(URL);
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));

  const headers = rows[0];
  const dataRows = rows.slice(1);

  const data = dataRows.map(row => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = row[i] ? row[i].trim() : "";
    });
    return obj;
  });

  render(data, headers);
}

function render(data, headers) {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach((item, i) => {
    const card = document.createElement("div");

    let cls = "card";
    if (i === 0) cls += " top";
    if (i < 4) cls += " playoff";

    let gridHTML = "";

    headers.forEach(h => {
      gridHTML += `
        <div class="field">${h}</div>
        <div class="value">${item[h]}</div>
      `;
    });

    card.className = cls;

    card.innerHTML = `
      <div class="rowTop">
        <div class="rank">#${i + 1}</div>
      </div>
      <div class="grid">
        ${gridHTML}
      </div>
    `;

    app.appendChild(card);
  });
}

load();

</script>

</body>
</html>
